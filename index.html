<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title><style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow:hidden;
}

/* خلفية متحركة */
.bg-blur{
  position:absolute;
  width:400px;
  height:400px;
  background:rgba(167,139,250,0.25);
  filter:blur(120px);
  border-radius:50%;
  animation:move 8s infinite alternate ease-in-out;
}

.bg-blur:nth-child(2){
  background:rgba(96,165,250,0.25);
  animation-delay:2s;
}

@keyframes move{
  0%{transform:translate(-50px,-50px);}
  100%{transform:translate(50px,50px);}
}

/* الكارد */
.card{
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:40px 30px;
  text-align:center;
  width:90%;
  max-width:400px;
}

/* الأيقونة */
.icon{
  font-size:50px;
  margin-bottom:15px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.15);}
}

/* العنوان */
.title{
  font-size:24px;
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* النص */
.text{
  font-size:14px;
  opacity:0.8;
  margin-bottom:20px;
}

/* progress bar */
.progress{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  animation:load 4s infinite;
}

@keyframes load{
  0%{width:0%;}
  50%{width:80%;}
  100%{width:100%;}
}

/* dots */
.dots span{
  animation:blink 1.5s infinite;
}

.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,80%,100%{opacity:0;}
  40%{opacity:1;}
}
</style></head><body><div class="bg-blur"></div>
<div class="bg-blur"></div><div class="card">
  <div class="icon">🛠️</div>  <div class="title">
    Under Maintenance
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
  </div>  <div class="text">
    We are currently upgrading the website to improve your experience.<br>
    Please check back soon.
  </div>  <div class="progress">
    <div class="progress-fill"></div>
  </div>
</div></body>
</html>
