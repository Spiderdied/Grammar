<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title><style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
}

/* Container */
.loader-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* Spinner */
.spinner{
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #a78bfa;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* Text */
.title{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.subtitle{
  font-size:14px;
  opacity:0.7;
}

/* Dots animation */
.dots span{
  animation:blink 1.4s infinite;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%,80%,100%{opacity:0;}
  40%{opacity:1;}
}
</style></head><body><div class="loader-container">
  <div class="spinner"></div>  <div class="title">
    Website Under Construction
    <span class="dots">
      <span>.</span><span>.</span><span>.</span>
    </span>
  </div>  <div class="subtitle">
    We're working hard to finish the project. Please check back soon.
  </div>
</div></body>
</html>
